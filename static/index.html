<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGP Monitor</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .state-Established { @apply bg-green-100 text-green-800; }
  body { font-family: 'Inter', sans-serif; }
  .fade-in { animation: fadeIn .3s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
</style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

<!-- ヘッダー -->
<header class="bg-gray-900 border-b border-gray-800 px-6 py-3 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-sm font-bold">B</div>
    <span class="text-lg font-bold tracking-wide">BGP Monitor</span>
  </div>
  <div class="flex items-center gap-3">
    <span id="last-updated" class="text-xs text-gray-500"></span>
    <div id="status-dot" class="w-2 h-2 rounded-full bg-gray-600"></div>
  </div>
</header>

<div class="flex h-[calc(100vh-52px)]">

  <!-- サイドバー -->
  <aside class="w-64 bg-gray-900 border-r border-gray-800 flex flex-col">
    <div class="px-4 py-3 border-b border-gray-800 flex items-center justify-between">
      <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">ルーター</span>
      <button onclick="openAddModal()" class="w-6 h-6 bg-blue-600 hover:bg-blue-500 rounded flex items-center justify-center text-sm transition-colors">+</button>
    </div>
    <div id="router-list" class="flex-1 overflow-y-auto py-2 space-y-0.5 px-2"></div>

    <!-- アラートフィード -->
    <div class="border-t border-gray-800">
      <div class="px-4 py-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">アラート</div>
      <div id="alert-feed" class="overflow-y-auto max-h-48 px-2 pb-2 space-y-1"></div>
    </div>
  </aside>

  <!-- メインコンテンツ -->
  <main class="flex-1 overflow-auto p-6">
    <div id="no-router" class="hidden flex flex-col items-center justify-center h-full text-gray-500">
      <p class="text-5xl mb-4">🌐</p>
      <p class="text-lg font-medium">ルーターを追加してください</p>
      <button onclick="openAddModal()" class="mt-4 px-5 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-sm transition-colors">+ ルーターを追加</button>
    </div>

    <div id="dashboard">
      <!-- 統計カード -->
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6" id="stat-cards"></div>

      <!-- BGP ピアテーブル -->
      <div class="bg-gray-900 rounded-xl border border-gray-800 mb-6">
        <div class="px-5 py-3 border-b border-gray-800 flex items-center justify-between">
          <h2 class="font-semibold text-sm">BGP ピア状態</h2>
          <div class="flex gap-2">
            <select id="router-filter" onchange="renderPeers()" class="bg-gray-800 border border-gray-700 text-xs rounded px-2 py-1 text-gray-300">
              <option value="all">全ルーター</option>
            </select>
            <button onclick="refreshAll()" class="px-3 py-1 bg-blue-600 hover:bg-blue-500 text-xs rounded transition-colors">更新</button>
          </div>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="text-xs text-gray-500 border-b border-gray-800">
                <th class="text-left px-5 py-2">ネイバー</th>
                <th class="text-left px-4 py-2">リモートAS</th>
                <th class="text-left px-4 py-2">状態</th>
                <th class="text-right px-4 py-2">プレフィックス数</th>
                <th class="text-left px-4 py-2">Up/Down</th>
                <th class="text-right px-4 py-2">受信MSG</th>
                <th class="text-right px-4 py-2 pr-5">送信MSG</th>
              </tr>
            </thead>
            <tbody id="peer-table"></tbody>
          </table>
        </div>
      </div>

      <!-- ルーティングテーブル -->
      <div class="bg-gray-900 rounded-xl border border-gray-800">
        <div class="px-5 py-3 border-b border-gray-800 flex items-center justify-between">
          <h2 class="font-semibold text-sm">ルーティングテーブル</h2>
          <div class="flex gap-2 items-center">
            <input id="route-filter" oninput="filterRoutes()" placeholder="プレフィックスで検索..." class="bg-gray-800 border border-gray-700 text-xs rounded px-2 py-1 text-gray-300 w-48 placeholder-gray-600">
            <select id="route-router-select" class="bg-gray-800 border border-gray-700 text-xs rounded px-2 py-1 text-gray-300">
              <option value="">ルーターを選択...</option>
            </select>
            <button onclick="loadRoutes()" class="px-3 py-1 bg-gray-700 hover:bg-gray-600 text-xs rounded transition-colors">取得</button>
          </div>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="text-xs text-gray-500 border-b border-gray-800">
                <th class="text-left px-5 py-2">プレフィックス</th>
                <th class="text-left px-4 py-2">ネクストホップ</th>
                <th class="text-left px-4 py-2">AS Path</th>
                <th class="text-right px-4 py-2">LocPrf</th>
                <th class="text-right px-4 py-2">Metric</th>
                <th class="text-center px-4 py-2 pr-5">Origin</th>
              </tr>
            </thead>
            <tbody id="route-table">
              <tr><td colspan="6" class="text-center py-8 text-gray-600 text-xs">ルーターを選択して「取得」を押してください</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- ルーター追加モーダル -->
<div id="add-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
  <div class="bg-gray-900 border border-gray-700 rounded-xl w-full max-w-md p-6">
    <h3 class="text-lg font-semibold mb-4">ルーターを追加</h3>
    <form id="add-form" class="space-y-3">
      <div class="grid grid-cols-2 gap-3">
        <div class="col-span-2">
          <label class="block text-xs text-gray-400 mb-1">表示名 *</label>
          <input name="name" required class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Router-A">
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1">ホスト / IP *</label>
          <input name="host" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="192.168.1.1">
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1">ポート</label>
          <input name="port" type="number" value="22" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1">ユーザー名</label>
          <input name="username" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="admin">
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1">パスワード</label>
          <input name="password" type="password" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="col-span-2">
          <label class="block text-xs text-gray-400 mb-1">デバイスタイプ</label>
          <select name="device_type" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="cisco_ios">Cisco IOS / IOS-XE</option>
            <option value="cisco_xr">Cisco IOS-XR</option>
            <option value="juniper_junos">Juniper JunOS</option>
            <option value="linux">Linux (FRRouting)</option>
            <option value="demo">デモ（実機不要）</option>
          </select>
        </div>
      </div>
      <div class="flex gap-3 pt-2">
        <button type="button" onclick="closeAddModal()" class="flex-1 py-2 border border-gray-700 rounded-lg text-sm hover:bg-gray-800 transition-colors">キャンセル</button>
        <button type="submit" class="flex-1 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm font-medium transition-colors">追加</button>
      </div>
    </form>
    <p class="text-xs text-gray-600 mt-3">※ デモを選ぶと実際のルーター不要で動作確認できます</p>
  </div>
</div>

<script>
let allStatus = []
let allRoutes = []
let selectedRouter = null

// ── データ取得 ─────────────────────────────────────────
async function fetchStatus() {
  try {
    const res = await fetch('/api/status')
    allStatus = await res.json()
    render()
    document.getElementById('status-dot').className = 'w-2 h-2 rounded-full bg-green-500'
    document.getElementById('last-updated').textContent = '更新: ' + new Date().toLocaleTimeString('ja-JP')
  } catch {
    document.getElementById('status-dot').className = 'w-2 h-2 rounded-full bg-red-500'
  }
}

async function fetchAlerts() {
  const res = await fetch('/api/alerts')
  const alerts = await res.json()
  renderAlerts(alerts)
}

async function loadRoutes() {
  const rid = document.getElementById('route-router-select').value
  if (!rid) return
  document.getElementById('route-table').innerHTML =
    '<tr><td colspan="6" class="text-center py-6 text-gray-500 text-xs">取得中...</td></tr>'
  try {
    const res = await fetch(`/api/routers/${rid}/routes`)
    allRoutes = await res.json()
    filterRoutes()
  } catch(e) {
    document.getElementById('route-table').innerHTML =
      `<tr><td colspan="6" class="text-center py-6 text-red-500 text-xs">エラー: ${e.message}</td></tr>`
  }
}

async function refreshAll() {
  for (const r of allStatus) {
    await fetch(`/api/routers/${r.id}/refresh`, { method: 'POST' }).catch(() => {})
  }
  await fetchStatus()
}

// ── 描画 ──────────────────────────────────────────────
function render() {
  renderRouterList()
  renderStats()
  renderPeers()
  updateSelects()
  const noRouter = document.getElementById('no-router')
  const dashboard = document.getElementById('dashboard')
  if (allStatus.length === 0) {
    noRouter.classList.remove('hidden')
    dashboard.classList.add('hidden')
  } else {
    noRouter.classList.add('hidden')
    dashboard.classList.remove('hidden')
  }
}

function renderRouterList() {
  const el = document.getElementById('router-list')
  el.innerHTML = allStatus.map(r => {
    const established = r.peers.filter(p => p.state === 'Established').length
    const total = r.peers.length
    const hasError = !!r.error
    return `
      <div class="flex items-center justify-between px-3 py-2 rounded-lg hover:bg-gray-800 group">
        <div class="flex-1 min-w-0 cursor-pointer" onclick="selectRouter('${r.id}')">
          <p class="text-sm font-medium text-gray-200 truncate">${r.name}</p>
          <p class="text-xs text-gray-500">${r.host}</p>
        </div>
        <div class="flex items-center gap-2 ml-2">
          ${hasError
            ? '<span class="text-xs text-red-400">エラー</span>'
            : `<span class="text-xs font-mono ${established < total ? 'text-yellow-400' : 'text-green-400'}">${established}/${total}</span>`}
          <button onclick="deleteRouter('${r.id}','${r.name}')"
            class="opacity-0 group-hover:opacity-100 text-gray-600 hover:text-red-400 transition-all text-xs px-1">✕</button>
        </div>
      </div>`
  }).join('')
}

function renderStats() {
  const totalPeers = allStatus.reduce((s, r) => s + r.peers.length, 0)
  const upPeers    = allStatus.reduce((s, r) => s + r.peers.filter(p => p.state === 'Established').length, 0)
  const downPeers  = totalPeers - upPeers
  const totalPfx   = allStatus.reduce((s, r) => s + (r.total_prefixes || 0), 0)

  const cards = [
    { label: 'ルーター数',      value: allStatus.length, color: 'text-blue-400' },
    { label: 'ピア (UP)',       value: upPeers,           color: 'text-green-400' },
    { label: 'ピア (DOWN)',     value: downPeers,         color: downPeers > 0 ? 'text-red-400' : 'text-gray-400' },
    { label: '総プレフィックス', value: totalPfx.toLocaleString(), color: 'text-purple-400' },
  ]

  document.getElementById('stat-cards').innerHTML = cards.map(c => `
    <div class="bg-gray-900 border border-gray-800 rounded-xl p-4">
      <p class="text-xs text-gray-500 mb-1">${c.label}</p>
      <p class="text-2xl font-bold ${c.color}">${c.value}</p>
    </div>`).join('')
}

function stateTag(state) {
  const map = {
    'Established': 'bg-green-900 text-green-300 border-green-800',
    'Idle':        'bg-red-900 text-red-300 border-red-800',
    'Active':      'bg-orange-900 text-orange-300 border-orange-800',
    'Connect':     'bg-yellow-900 text-yellow-300 border-yellow-800',
  }
  const cls = map[state] ?? 'bg-gray-800 text-gray-400 border-gray-700'
  return `<span class="text-xs px-2 py-0.5 rounded border font-medium ${cls}">${state}</span>`
}

function renderPeers() {
  const filter = document.getElementById('router-filter').value
  const tbody  = document.getElementById('peer-table')
  const rows   = []

  for (const r of allStatus) {
    if (filter !== 'all' && r.id !== filter) continue
    if (r.error) {
      rows.push(`<tr class="border-t border-gray-800">
        <td colspan="7" class="px-5 py-3 text-xs text-red-400">
          ${r.name}: エラー — ${r.error}
        </td></tr>`)
      continue
    }
    if (r.peers.length === 0) {
      rows.push(`<tr class="border-t border-gray-800">
        <td colspan="7" class="px-5 py-3 text-xs text-gray-500">${r.name}: データ取得中...</td></tr>`)
      continue
    }
    for (const p of r.peers) {
      rows.push(`
        <tr class="border-t border-gray-800 hover:bg-gray-800/50 transition-colors fade-in">
          <td class="px-5 py-2.5">
            <div class="font-mono text-xs text-gray-200">${p.neighbor}</div>
            <div class="text-xs text-gray-500">${r.name}</div>
          </td>
          <td class="px-4 py-2.5 text-xs font-mono text-gray-300">AS${p.remote_as}</td>
          <td class="px-4 py-2.5">${stateTag(p.state)}</td>
          <td class="px-4 py-2.5 text-right text-xs font-mono text-gray-300">
            ${p.state === 'Established' ? p.prefix_count.toLocaleString() : '—'}
          </td>
          <td class="px-4 py-2.5 text-xs font-mono text-gray-400">${p.updown}</td>
          <td class="px-4 py-2.5 text-right text-xs font-mono text-gray-400">${p.msg_rcvd.toLocaleString()}</td>
          <td class="px-4 py-2.5 pr-5 text-right text-xs font-mono text-gray-400">${p.msg_sent.toLocaleString()}</td>
        </tr>`)
    }
  }

  tbody.innerHTML = rows.length
    ? rows.join('')
    : '<tr><td colspan="7" class="text-center py-8 text-gray-600 text-xs">ピアが見つかりません</td></tr>'
}

function filterRoutes() {
  const q     = document.getElementById('route-filter').value.toLowerCase()
  const tbody = document.getElementById('route-table')
  const list  = q ? allRoutes.filter(r => r.prefix.includes(q) || r.as_path.includes(q)) : allRoutes

  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-gray-600 text-xs">ルートが見つかりません</td></tr>'
    return
  }

  tbody.innerHTML = list.slice(0, 500).map(r => `
    <tr class="border-t border-gray-800 hover:bg-gray-800/50 transition-colors">
      <td class="px-5 py-2 font-mono text-xs text-blue-300">${r.prefix}</td>
      <td class="px-4 py-2 font-mono text-xs text-gray-300">${r.next_hop}</td>
      <td class="px-4 py-2 font-mono text-xs text-gray-400">${r.as_path || '—'}</td>
      <td class="px-4 py-2 text-right text-xs font-mono text-gray-400">${r.local_pref}</td>
      <td class="px-4 py-2 text-right text-xs font-mono text-gray-400">${r.metric}</td>
      <td class="px-4 py-2 pr-5 text-center text-xs font-mono text-gray-400">${r.origin}</td>
    </tr>`).join('')
}

function renderAlerts(alerts) {
  const el = document.getElementById('alert-feed')
  if (alerts.length === 0) {
    el.innerHTML = '<p class="text-xs text-gray-600 px-2 py-1">アラートなし</p>'
    return
  }
  el.innerHTML = alerts.slice(0, 10).map(a => {
    const time = new Date(a.time).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' })
    const icon = a.level === 'info' ? '🟢' : '🔴'
    return `<div class="px-2 py-1 rounded text-xs ${a.level === 'info' ? 'bg-green-900/30' : 'bg-red-900/30'}">
      <span class="text-gray-500">${time}</span> ${icon}
      <span class="text-gray-300">${a.neighbor}</span>
      <span class="text-gray-500">${a.old_state}→${a.new_state}</span>
    </div>`
  }).join('')
}

function updateSelects() {
  const filter = document.getElementById('router-filter')
  const sel    = document.getElementById('route-router-select')
  const ids    = new Set([...filter.options].map(o => o.value))

  for (const r of allStatus) {
    if (!ids.has(r.id)) {
      const o1 = new Option(r.name, r.id)
      const o2 = new Option(r.name, r.id)
      filter.appendChild(o1)
      sel.appendChild(o2)
    }
  }
}

async function deleteRouter(id, name) {
  if (!confirm(`「${name}」を削除しますか？`)) return
  await fetch(`/api/routers/${id}`, { method: 'DELETE' })
  await fetchStatus()
}

function selectRouter(id) {
  selectedRouter = id
  document.getElementById('router-filter').value = id
  renderPeers()
}

// ── モーダル ──────────────────────────────────────────
function openAddModal()  { document.getElementById('add-modal').classList.remove('hidden') }
function closeAddModal() { document.getElementById('add-modal').classList.add('hidden') }

document.getElementById('add-form').addEventListener('submit', async e => {
  e.preventDefault()
  const fd   = new FormData(e.target)
  const body = Object.fromEntries(fd)
  body.port  = parseInt(body.port)
  await fetch('/api/routers', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
  closeAddModal()
  e.target.reset()
  await fetchStatus()
})

document.getElementById('add-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeAddModal()
})

// ── ポーリング ────────────────────────────────────────
fetchStatus()
fetchAlerts()
setInterval(fetchStatus, 10000)
setInterval(fetchAlerts, 15000)
</script>
</body>
</html>
